<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bairro</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; }
    header {
      background-color: blue;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0; /* remove espaço extra abaixo do header */
    }
    header h1 {
      margin: 0;
      flex-grow: 1;
      text-align: center;
      font-size: 36px; /* título maior */
      font-weight: bold;
    }
    header button {
      background-color: white;
      color: blue;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: bold;
    }
    /* Container da imagem e botões */
    .image-container {
      display: flex;              /* alinhamento horizontal */
      align-items: flex-start;    /* todos alinhados pelo topo */
      justify-content: center;    /* centraliza horizontalmente */
      margin-top: 5px;            /* reduz espaço abaixo do título */
      width: 70%;                 /* ocupa 70% da largura da página */
      gap: 15px;                  /* espaço entre imagem e botões */
    }
    .image-container img {
      width: 100%;                /* imagem ocupa todo espaço do container */
      border: 2px solid #ccc;
      display: block;
    }
    /* Botões ficam ao lado da imagem */
    .buttons-container {
      display: flex;
      flex-direction: column;     /* botões empilhados verticalmente */
      gap: 10px;
    }
    .buttons-container button {
      background-color: white;
      border: 1px solid #ccc;
      padding: 8px;
      cursor: pointer;
      font-size: 14px;
      width: 120px;
      text-align: center;
    }
    form { margin: 20px; }
    input { margin: 5px; padding: 5px; }
    button { margin: 5px; padding: 5px 10px; }
    table { border-collapse: collapse; width: 90%; margin: 20px auto; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
  </style>
</head>
<body>
  <header>
    <button onclick="location.href='index.html'">Voltar</button>
    <h1 id="tituloBairro">Bairro</h1>
    <div style="width:60px;"></div>
  </header>

  <div class="image-container">
    <img id="mapaBairro" src="" alt="Mapa do bairro">
    <div class="buttons-container">
      <button onclick="shareLink()">🔗 Link</button>
      <button onclick="downloadImage()">⬇️ Baixar</button>
    </div>
  </div>

  <form id="personForm">
    <input type="text" id="dirigente" placeholder="Nome do dirigente" required>
    <input type="date" id="saida" required>
    <button type="submit">Adicionar</button>
  </form>

  <table id="personTable">
    <thead>
      <tr>
        <th>Nome do dirigente</th>
        <th>Data da saída de Campo</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    // Captura parâmetros da URL
    const params = new URLSearchParams(window.location.search);
    const bairro = params.get('nome') || "Bairro";
    const img = params.get('img') || "mapa.png";

    document.getElementById('tituloBairro').textContent = bairro;
    document.getElementById('mapaBairro').src = img;

    const form = document.getElementById('personForm');
    const tableBody = document.querySelector('#personTable tbody');
    let registros = [];

    // Carregar registros do backend
    async function loadRegistros() {
      const res = await fetch('/api/pessoas');
      const data = await res.json();
      registros = data.filter(r => r.bairro === bairro);
      renderTable();
    }

    // Renderizar tabela
    function renderTable() {
      tableBody.innerHTML = '';
      registros.forEach((item, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.dirigente}</td>
          <td>${item.saida}</td>
          <td>
            <button onclick="editRegistro(${index})">Editar</button>
            <button onclick="deleteRegistro(${item.id})">Remover</button>
          </td>
        `;
        tableBody.appendChild(row);
      });
    }

    // Adicionar registro
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const dirigente = document.getElementById('dirigente').value;
      const saida = document.getElementById('saida').value;

      await fetch('/api/pessoas', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bairro, dirigente, saida })
      });

      form.reset();
      loadRegistros();
    });

    // Editar registro (remove e re-adiciona)
    async function editRegistro(index) {
      const registro = registros[index];
      document.getElementById('dirigente').value = registro.dirigente;
      document.getElementById('saida').value = registro.saida;
      await deleteRegistro(registro.id);
    }

    // Remover registro
    async function deleteRegistro(id) {
      await fetch(`/api/pessoas?id=${id}`, { method: 'DELETE' });
      loadRegistros();
    }

    // Compartilhar link da imagem
    async function shareLink() {
      const imgUrl = document.getElementById('mapaBairro').src;
      if (navigator.share) {
        try {
          await navigator.share({
            title: "Mapa do bairro",
            text: "Confira este mapa!",
            url: imgUrl
          });
        } catch (err) {
          console.error("Erro ao compartilhar link:", err);
        }
      } else {
        alert("Compartilhamento de link não suportado neste navegador.");
      }
    }

    // Baixar imagem para compartilhar manualmente
    function downloadImage() {
      const imgUrl = document.getElementById('mapaBairro').src;
      const a = document.createElement('a');
      a.href = imgUrl;
      a.download = "mapa-bairro.png";
      a.click();
    }

    // Inicializar
    loadRegistros();
  </script>
</body>
</html>
