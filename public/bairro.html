<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bairro</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; }
    header {
      background-color: blue;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      flex-grow: 1;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
    header button {
      background-color: white;
      color: blue;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: bold;
    }
    .login-container {
      margin: 50px auto;
      width: 300px;
      text-align: center;
    }
    .login-container input {
      display: block;
      width: 90%;
      margin: 10px auto;
      padding: 8px;
    }
    .login-container button {
      padding: 8px 12px;
      margin-top: 10px;
      cursor: pointer;
    }
    /* Conteúdo protegido inicialmente oculto */
    #conteudo { display: none; }
    .image-container {
      position: relative;
      display: block;
      margin: 20px auto;
      width: 70%;
    }
    .image-container img {
      width: 100%;
      border: 2px solid #ccc;
      display: block;
    }
    .share-btn, .download-btn {
      position: absolute;
      right: 10px;
      background-color: white;
      border: 1px solid #ccc;
      padding: 5px;
      cursor: pointer;
      font-size: 14px;
      width: 100px;
      text-align: center;
    }
    .share-btn { top: 10px; }
    .download-btn { top: 45px; }
    form { margin: 20px; }
    input { margin: 5px; padding: 5px; }
    button { margin: 5px; padding: 5px 10px; }
    table { border-collapse: collapse; width: 90%; margin: 20px auto; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
  </style>
</head>
<body>
  <!-- Formulário de login -->
  <div class="login-container" id="loginBox">
    <h2>Login</h2>
    <input type="text" id="usuario" placeholder="Usuário" required>
    <input type="password" id="senha" placeholder="Senha" required>
    <button onclick="fazerLogin()">Entrar</button>
  </div>

  <!-- Conteúdo protegido -->
  <div id="conteudo">
    <header>
      <button onclick="location.href='index.html'">Voltar</button>
      <h1 id="tituloBairro">Bairro</h1>
      <div style="width:60px;"></div>
    </header>

    <div class="image-container">
      <img id="mapaBairro" src="" alt="Mapa do bairro">
      <button class="share-btn" onclick="shareLink()">🔗 Link</button>
      <button class="download-btn" onclick="downloadImage()">⬇️ Baixar</button>
    </div>

    <form id="personForm">
      <input type="text" id="dirigente" placeholder="Nome do dirigente" required>
      <input type="date" id="saida" required>
      <button type="submit">Adicionar</button>
    </form>

    <table id="personTable">
      <thead>
        <tr>
          <th>Nome do dirigente</th>
          <th>Data da saída de Campo</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    async function fazerLogin() {
      const usuario = document.getElementById('usuario').value;
      const senha = document.getElementById('senha').value;

      const resposta = await fetch("login.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ usuario, senha })
      });

      const resultado = await resposta.json();

      if (!resultado.sucesso) {
        alert("Usuário ou senha inválidos!");
        window.location.href = "index.html"; // volta para inicial
      } else {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("conteudo").style.display = "block";
        inicializarConteudo();
      }
    }

    function inicializarConteudo() {
      const params = new URLSearchParams(window.location.search);
      const bairro = params.get('nome') || "Bairro";
      const img = params.get('img') || "mapa.png";

      document.getElementById('tituloBairro').textContent = bairro;
      document.getElementById('mapaBairro').src = img;

      // aqui você chama loadRegistros() etc.
      loadRegistros();
    }

    // ... (restante do seu código JS de registros, tabela, etc.)
  </script>
</body>
</html>
